<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>Task Manager</h1>
        <button id="dark-mode-toggle" type="button" aria-pressed="false">
          Dark Mode
        </button>
      </div>
    </header>
    <main>
      <section class="list-form-section">
        <form id="list-form">
          <label for="list-name-input">Create a new list:</label>
          <input
            type="text"
            id="list-name-input"
            name="listName"
            placeholder="Enter list name"
            required
            aria-describedby="list-help"
          />
          <small id="list-help"
            >Press Enter or click Create List to add a new task list.</small
          >
          <button type="submit">Create List</button>
        </form>
      </section>
      <section class="task-form-section">
        <form id="task-form">
          <label for="list-select">Select list:</label>
          <select id="list-select" name="listSelect" required>
            <option value="">Choose a list...</option>
          </select>
          <label for="task-input">Enter a new task:</label>
          <input
            type="text"
            id="task-input"
            name="task"
            required
            aria-describedby="task-help"
          />
          <small id="task-help">Press Enter or click Add Task to submit.</small>
          <button type="submit">Add Task</button>
        </form>
      </section>
      <section class="filter-section">
        <h2>Filter Tasks</h2>
        <div class="filter-buttons">
          <button id="filter-all" class="filter-btn active">All Tasks</button>
          <button id="filter-completed" class="filter-btn">Completed</button>
          <button id="filter-pending" class="filter-btn">Pending</button>
        </div>
      </section>
      <section class="lists-section">
        <div id="lists-container"></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
